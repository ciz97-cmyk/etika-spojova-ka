<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morální dilemata — seřaď rozhodnutí</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ec;
    --surface: #ffffff;
    --surface2: #eeebe3;
    --border: #d8d3c8;
    --border2: #c4bfb3;
    --text: #1a1814;
    --text2: #5a5650;
    --text3: #9a958e;
    --accent: #2d4a3e;
    --rank1: #2d6a3e; --rank2: #5c9e50; --rank3: #a0b070;
    --rank4: #d4953a; --rank5: #c85f30; --rank6: #b83030;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-drag: 0 8px 32px rgba(0,0,0,0.18);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--accent);
    padding: 28px 40px 24px;
    color: #fff;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }

  header p {
    font-size: 0.9rem;
    opacity: 0.7;
    font-weight: 300;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 32px 0;
  }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; padding: 20px 16px 0; }
    header { padding: 20px 20px 18px; }
    header h1 { font-size: 1.5rem; }
  }

  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 500;
    margin-bottom: 12px;
  }

  /* POOL */
  .pool {
    background: var(--surface2);
    border: 1.5px dashed var(--border2);
    border-radius: 14px;
    padding: 12px;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: background 0.15s, border-color 0.15s;
  }

  .pool.drag-over {
    background: #e8f0ec;
    border-color: var(--accent);
  }

  .pool-empty {
    text-align: center;
    padding: 24px;
    color: var(--text3);
    font-size: 0.85rem;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
    cursor: grab;
    user-select: none;
    transition: box-shadow 0.15s, transform 0.15s, opacity 0.15s;
    position: relative;
  }

  .card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.3; transform: scale(0.97); }
  .card.ghost { box-shadow: var(--shadow-drag); transform: rotate(1.5deg) scale(1.02); opacity: 1 !important; }

  .card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .card-ico {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .card-tag {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 500;
  }

  .card-body {
    font-size: 0.83rem;
    line-height: 1.6;
    color: var(--text2);
  }

  .card-body strong { color: var(--text); font-weight: 500; }

  /* RANK LIST */
  .rank-legend {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text2);
  }

  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
  }

  .rank-rows { display: flex; flex-direction: column; gap: 10px; }

  .rank-row {
    display: flex;
    align-items: stretch;
    gap: 10px;
  }

  .rank-num {
    width: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    flex-shrink: 0;
    border-radius: 8px;
  }

  .drop-zone {
    flex: 1;
    min-height: 72px;
    border: 1.5px dashed var(--border2);
    border-radius: 10px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .drop-zone.has-card {
    border: none;
    background: transparent;
    min-height: 0;
    display: block;
  }

  .drop-zone.drag-over {
    background: #e8f0ec;
    border-color: var(--accent);
    border-style: solid;
  }

  .drop-hint {
    font-size: 0.75rem;
    color: var(--text3);
  }

  /* BOTTOM */
  .bottom {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 32px 40px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  @media (max-width: 700px) { .bottom { padding: 20px 16px 32px; } }

  .progress {
    font-size: 0.8rem;
    color: var(--text3);
    margin-right: auto;
  }

  .progress span {
    font-weight: 500;
    color: var(--accent);
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 10px 22px;
    border-radius: 8px;
    border: 1.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-weight: 400;
    transition: background 0.12s, border-color 0.12s;
  }

  button:hover { background: var(--surface); }

  button.btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  button.btn-primary:hover { background: #1e3a2e; }
  button.btn-primary:disabled { opacity: 0.4; cursor: default; }

  /* RESULT */
  .result {
    max-width: 1100px;
    margin: 0 auto 40px;
    padding: 0 32px;
    display: none;
  }

  @media (max-width: 700px) { .result { padding: 0 16px; } }

  .result.show { display: block; }

  .result-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .result-header {
    background: var(--accent);
    color: #fff;
    padding: 16px 20px;
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    font-weight: 400;
  }

  .result-rows { padding: 8px 0; }

  .result-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--bg);
    transition: background 0.1s;
  }

  .result-row:last-child { border-bottom: none; }
  .result-row:hover { background: var(--bg); }

  .res-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    width: 22px;
    flex-shrink: 0;
  }

  .res-ico { font-size: 18px; width: 28px; flex-shrink: 0; text-align: center; }
  .res-name { flex: 1; font-size: 0.88rem; font-weight: 500; color: var(--text); }

  .res-badge {
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<header>
  <h1>Morální dilemata</h1>
  <p>Přetáhni kartičky ze zásobníku na správné místo — od nejlepšího (1) po nejhorší (6) rozhodnutí.</p>
</header>

<div class="main">
  <div>
    <p class="section-label">Zásobník karet</p>
    <div class="pool" id="pool"></div>
  </div>
  <div>
    <div class="rank-legend">
      <div class="legend-item"><span class="legend-dot" style="background:var(--rank1)"></span> 1 = nejlepší rozhodnutí</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--rank6)"></span> 6 = nejhorší rozhodnutí</div>
    </div>
    <div class="rank-rows" id="rank-rows"></div>
  </div>
</div>

<div class="bottom">
  <p class="progress" id="progress">Umístěno: <span>0</span> / 6 karet</p>
  <button onclick="resetAll()">↺ Začít znovu</button>
  <button class="btn-primary" id="btn-submit" onclick="submitRanking()" disabled>Odeslat hodnocení →</button>
</div>

<div class="result" id="result">
  <div class="result-box">
    <div class="result-header">Tvoje výsledné pořadí</div>
    <div class="result-rows" id="result-rows"></div>
  </div>
</div>

<script>
const CARDS = [
  { id:'c1', ico:'🍺', tag:'Přátelství · zákon', bg:'#e8f5e0', icoColor:'#3B6D11',
    label:'Petr koupí Janovi alkohol',
    body:'Jan chce koupit alkohol, i když mu ještě nebylo 18 let. Jeho kamarád <strong>Petr</strong>, který už 18 má, ví, že je to zakázané a že by mohli dostat pokutu nebo problém s rodiči. Přesto se Petr rozhodne pomoci Janovi alkohol koupit, aby ho nezklamal, i když tím porušuje zákon a riskuje následky.' },
  { id:'c2', ico:'💊', tag:'Empatie · pravidla', bg:'#fef3e0', icoColor:'#854F0B',
    label:'Sestra ukradne léky',
    body:'Sestra ví, že její kamarád <strong>Jan</strong> je velmi nervózní před cestou letadlem a hrozí mu kolaps. V nemocnici jsou dostupné léky proti stresu pouze pro pacienty. Přesto se sestra rozhodne ukrást léky a dát je Janovi, aby mu pomohla zvládnout cestu, i když tím porušuje pravidla nemocnice a riskuje napomenutí.' },
  { id:'c3', ico:'🚬', tag:'Pohoda pacienta · řád', bg:'#e0f0fb', icoColor:'#185FA5',
    label:'Sestra podá cigaretu',
    body:'Sestra si všimla, že pacient zoufale touží po cigaretě, i když mu to nemocniční pravidla zakazují. I přes zákaz se sestra rozhodla pacientovi cigaretu podat, protože věděla, že by ho to opravdu potěšilo, i když riskovala napomenutí od vedení nemocnice.' },
  { id:'c4', ico:'💔', tag:'Věrnost · pravda', bg:'#f5e8fc', icoColor:'#3C3489',
    label:'Eva skryje nevěru',
    body:'<strong>Eva</strong> ví, že její nejlepší kamarádka je v dlouhodobém vztahu, ale podvádí partnera. Eva ví, že pokud to odhalí, zničí přátelství i vztah kamarádky. Rozhodne se držet tajemství, i když ví, že partner kamarádky by měl právo znát pravdu.' },
  { id:'c5', ico:'🎪', tag:'Solidarita · festival', bg:'#fde8e8', icoColor:'#993C1D',
    label:'Adam podá náramek přes plot',
    body:'<strong>Adam</strong> a Lukáš se chystají na festival Colours of Ostrava. Lukáš ještě nemá vstupní náramek a nemohl by projít turniketem. Adam ví, že by bylo proti pravidlům sundat náramek a podat ho Lukášovi přes plot – je to vlastně jako krádež vstupenky. Přesto se Adam rozhodne podat náramek Lukášovi, aby mohl projít, i když tím porušuje pravidla festivalu a riskuje problémy.' },
  { id:'c6', ico:'🤖', tag:'Vzdělání · přátelství', bg:'#e0f8ef', icoColor:'#0F6E56',
    label:'Kamarádka nahlásí opisování',
    body:'Kamarádka ví, že <strong>Ema</strong> často používá ChatGPT při opisování testů. Ví také, že pokud to učitelka zjistí, může Ema dostat pětku a pravděpodobně i napomenutí. Kamarádka se rozhodla to nahlásit učitelce, i když věděla, že tím ohrozí jejich přátelství a vztahy ve třídě.' },
];

const RANKS = ['#2d6a3e','#5c9e50','#a0b070','#d4953a','#c85f30','#b83030'];
const RANK_LABELS = ['Nejlepší','Dobré','Průměrné','Sporné','Špatné','Nejhorší'];

let slots = Array(6).fill(null);
let dragId = null;
let dragFrom = null; // 'pool' or slot index

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }
const poolOrder = shuffle([...CARDS]);

function makeCard(card){
  const d = document.createElement('div');
  d.className = 'card';
  d.draggable = true;
  d.dataset.id = card.id;
  d.innerHTML = `
    <div class="card-head">
      <div class="card-ico" style="background:${card.bg};color:${card.icoColor}">${card.ico}</div>
      <span class="card-tag">${card.tag}</span>
    </div>
    <div class="card-body">${card.body}</div>`;
  d.addEventListener('dragstart', e => {
    dragId = card.id;
    dragFrom = d.closest('#pool') ? 'pool' : +d.closest('[data-slot]').dataset.slot;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => d.classList.add('dragging'), 0);
  });
  d.addEventListener('dragend', () => d.classList.remove('dragging'));
  return d;
}

function setupDropTarget(el, onDrop){
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', e => { if(!el.contains(e.relatedTarget)) el.classList.remove('drag-over'); });
  el.addEventListener('drop', e => { e.preventDefault(); el.classList.remove('drag-over'); onDrop(); });
}

function renderAll(){
  renderPool();
  renderSlots();
  updateProgress();
}

function renderPool(){
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  const inSlots = new Set(slots.filter(Boolean).map(c=>c.id));
  const visible = poolOrder.filter(c => !inSlots.has(c.id));
  if(visible.length === 0){
    pool.innerHTML = '<p class="pool-empty">Zásobník je prázdný ✓</p>';
  } else {
    visible.forEach(c => pool.appendChild(makeCard(c)));
  }
  setupDropTarget(pool, () => {
    if(dragFrom !== 'pool' && dragFrom !== null){
      slots[dragFrom] = null;
      dragId = null; dragFrom = null;
      renderAll();
    }
  });
}

function renderSlots(){
  const list = document.getElementById('rank-rows');
  list.innerHTML = '';
  slots.forEach((card, i) => {
    const row = document.createElement('div');
    row.className = 'rank-row';

    const num = document.createElement('div');
    num.className = 'rank-num';
    num.style.color = RANKS[i];
    num.textContent = i+1;
    row.appendChild(num);

    const zone = document.createElement('div');
    zone.dataset.slot = i;
    if(card){
      zone.className = 'drop-zone has-card';
      zone.appendChild(makeCard(card));
    } else {
      zone.className = 'drop-zone';
      zone.innerHTML = '<span class="drop-hint">přetáhni sem</span>';
    }
    setupDropTarget(zone, () => {
      const src = CARDS.find(c => c.id === dragId);
      if(!src) return;
      const prevCard = slots[i];
      if(dragFrom === 'pool'){
        slots[i] = src;
      } else if(typeof dragFrom === 'number' && dragFrom !== i){
        slots[i] = src;
        slots[dragFrom] = prevCard;
      }
      dragId = null; dragFrom = null;
      renderAll();
    });
    row.appendChild(zone);
    list.appendChild(row);
  });
}

function updateProgress(){
  const filled = slots.filter(Boolean).length;
  document.querySelector('#progress span').textContent = filled;
  document.getElementById('btn-submit').disabled = filled < 6;
}

function submitRanking(){
  if(slots.some(s=>!s)){ alert('Nejdřív přetáhni všechny kartičky!'); return; }
  const rows = document.getElementById('result-rows');
  rows.innerHTML = slots.map((c,i) => `
    <div class="result-row">
      <span class="res-num" style="color:${RANKS[i]}">${i+1}</span>
      <span class="res-ico">${c.ico}</span>
      <span class="res-name">${c.label}</span>
      <span class="res-badge" style="background:${RANKS[i]}22;color:${RANKS[i]}">${RANK_LABELS[i]}</span>
    </div>`).join('');
  const el = document.getElementById('result');
  el.classList.add('show');
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetAll(){
  slots = Array(6).fill(null);
  document.getElementById('result').classList.remove('show');
  renderAll();
}

renderAll();
</script>
</body>
</html>
